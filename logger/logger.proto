syntax= "proto3";

package logger;

option go_package = "github.com/ohsu-comp-bio/funnel/logger";

message JSONFormatConfig {
  bool DisableTimestamp = 1;
  string TimestampFormat = 2;
}

message TextFormatConfig {
  bool ForceColors = 1;
  bool DisableColors = 2;
  bool DisableTimestamp = 3;
  bool FullTimestamp = 4;
  string TimestampFormat = 5;
  bool DisableSorting = 6;
  string Indent = 7;
}

message LoggerConfig {
  string Level = 1;
  string Formatter = 2;
  string OutputFile = 3;
  JSONFormatConfig JsonFormat = 4;
  TextFormatConfig TextFormat = 5;
}
