name: Integration Tests

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yaml

  integration-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download Funnel binary
        uses: actions/download-artifact@v4
        with:
          name: funnel

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: funnel-test

      - name: Setup kubectl
        run: |
          # Verify cluster is accessible
          kubectl cluster-info

      - name: Setup storage for MinIO
        run: |
          # Create a local-path storage class for Kind
          kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
          
          # Set local-path as default StorageClass
          kubectl patch storageclass standard -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
          kubectl patch storageclass local-path -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

      - name: Setup MinIO
        run: |
          kubectl create namespace storage
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: minio-pvc
            namespace: storage
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: minio
            namespace: storage
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: minio
            template:
              metadata:
                labels:
                  app: minio
              spec:
                containers:
                  - name: minio
                    image: minio/minio:latest
                    args:
                      - server
                      - /data
                    env:
                      - name: MINIO_ROOT_USER
                        value: "minioadmin"
                      - name: MINIO_ROOT_PASSWORD
                        value: "minioadmin"
                    ports:
                      - containerPort: 9000
                        name: s3
                      - containerPort: 9001
                        name: console
                    volumeMounts:
                      - name: data
                        mountPath: /data
                    livenessProbe:
                      httpGet:
                        path: /minio/health/live
                        port: 9000
                      initialDelaySeconds: 30
                      periodSeconds: 10
                    readinessProbe:
                      httpGet:
                        path: /minio/health/live
                        port: 9000
                      initialDelaySeconds: 30
                      periodSeconds: 10
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: minio-pvc
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: minio
            namespace: storage
          spec:
            selector:
              app: minio
            ports:
              - name: s3
                port: 9000
                targetPort: 9000
              - name: console
                port: 9001
                targetPort: 9001
            type: ClusterIP
          EOF

      - name: Wait for MinIO to be ready
        run: |
          kubectl wait --for=condition=available deployment/minio --namespace=storage --timeout=120s

      - name: Add Helm repos
        run: |
          helm repo add ohsu https://ohsu-comp-bio.github.io/helm-charts
          helm repo add gen3 https://helm.gen3.org
          helm repo update

      - name: Create Funnel values file
        run: |
          cat <<EOF > values.yaml
          storage:
            className: local-path
            provisioner: driver.local.io
          config:
            # Disable other storage backends
            LocalStorage:
              Disabled: true
            AmazonS3:
              Disabled: true
            GoogleStorage:
              Disabled: true
            HTTPStorage:
              Disabled: true
            FTPStorage:
              Disabled: true
            # Enable GenericS3 with MinIO
            GenericS3:
              - Disabled: false
                Endpoint: "minio.storage.svc.cluster.local:9000"
                Key: "minioadmin"
                Secret: "minioadmin"
                Bucket: "funnel"
                Insecure: true
          EOF

      - name: Install Funnel Helm Chart
        run: |
          helm upgrade --install funnel ohsu/funnel --values values.yaml --devel --wait --timeout 180s

      - name: Wait for Funnel to be ready
        run: |
          kubectl wait --for=condition=available deployment/funnel-server --timeout=120s

      - name: Install Gen3Workflow Helm Chart
        run: |
          helm upgrade --install gen3-workflow gen3/gen3-workflow --wait --timeout 180s

      - name: Run integration tests
        run: |
          chmod +x funnel
          
          # Port-forward Funnel service
          kubectl port-forward svc/funnel 8000:8000 &
          sleep 5
          
          # Test with hello world example
          funnel examples hello-world > hello-world.json
          ID=$(funnel task create hello-world.json)
          echo "Created task: $ID"
          
          # Wait for task completion
          kubectl wait --for=condition=Complete job/$ID --timeout=120s || true
          
          # Check task status
          funnel task get $ID
          
          # Verify completion
          funnel task get $ID | grep -q COMPLETE

      - name: Cleanup
        if: always()
        run: |
          helm uninstall funnel
          helm uninstall gen3-workflow
          kind delete cluster --name funnel-test
