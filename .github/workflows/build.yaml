name: Build Funnel

on:
  workflow_call:
    inputs:
      cache:
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go 1.x
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build Funnel
      run: make build

    - name: Upload Funnel binary as artifact
      uses: actions/upload-artifact@v4
      with:
        name: funnel
        path: funnel
