name: Go Tests

on:
  push:

# Cancel redundant jobs (if a new job is triggered for the same workflow and ref)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # https://github.com/golangci/golangci-lint/releases/tag/v2.11.4
          version: v2.11.4
          args: >-
              --timeout 3m
              --enable-only=govet,gofmt,goimports,misspell
              --exclude-dirs=vendor
              --exclude-dirs=webdash
              --exclude-dirs=cmd/webdash
              --exclude-dirs=funnel-work-dir
              --exclude=.*bundle.go
              --exclude=.*pb.go
              --exclude=.*pb.gw.go

